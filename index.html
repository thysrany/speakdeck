<!DOCTYPE html>
<!-- SpeakDeck v3 - Build 20260524 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0f0f0f">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>SpeakDeck 3.0</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:Arial,Helvetica,sans-serif}
body{background:#0f0f0f;color:#f0ece3}
body.light{background:#f4f4f4;color:#1a1a1a}
:root{
  --gold:#f5c842;--gold2:#c9a130;
  --bg:#0f0f0f;--s:#1a1a1a;--s2:#222;--b:#2a2a2a;
  --t:#f0ece3;--t2:#ccc;--t3:#888;
  --folder-name:#e0dcd3;--topic-name:#ccc;
  --row-hover:#1e1e1e;--row-active:#222;
  --toc-head:#1e1e1e;--card-bg:#1a1a1a;
  --modal-bg:#1c1c1c;--input-bg:#111;
  --handle:#888;--faction-border:#555;--faction-color:#aaa;
  --overlay:rgba(0,0,0,.85);--sb-overlay:rgba(0,0,0,.6);
  --red:#c0392b;--toast-bg:#1e1e1e;--toast-border:#333;--empty-h:#444;
}
body.light{
  --bg:#f4f4f4;--s:#fff;--s2:#f0f0f0;--b:#ddd;
  --t:#1a1a1a;--t2:#333;--t3:#666;
  --folder-name:#1a1a1a;--topic-name:#333;
  --row-hover:#f0f0f0;--row-active:#fff8e1;
  --toc-head:#f5f5f5;--card-bg:#fff;
  --modal-bg:#fff;--input-bg:#f8f8f8;
  --handle:#999;--faction-border:#ccc;--faction-color:#555;
  --overlay:rgba(0,0,0,.5);--sb-overlay:rgba(0,0,0,.3);
  --toast-bg:#fff;--toast-border:#ddd;--empty-h:#999;
}
.app{display:flex;height:100vh;height:100dvh;background:var(--bg)}
/* SIDEBAR */
.sidebar{width:250px;min-width:250px;background:var(--s);border-right:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden;transition:transform .25s;z-index:50}
.logo{padding:14px 16px 12px;border-bottom:1px solid var(--b);display:flex;flex-direction:column}
.logo-row{display:flex;align-items:center;justify-content:space-between}
.logo h1{font-size:18px;font-weight:900;color:var(--gold)}
.logo p{font-size:10px;color:var(--t3);letter-spacing:1px;margin-top:1px}
.theme-btn{width:30px;height:30px;border-radius:50%;background:transparent;border:1px solid var(--faction-border);color:var(--t3);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.user-row{display:flex;align-items:center;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--b)}
.user-avatar{width:20px;height:20px;border-radius:50%;flex-shrink:0}
.user-name{font-size:10px;color:var(--t3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.signout-btn{font-size:9px;padding:2px 6px;border-radius:4px;background:transparent;border:1px solid var(--faction-border);color:var(--t3);cursor:pointer}
.signin-btn{margin-top:8px;width:100%;padding:8px;background:var(--gold);color:#000;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.sb-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sb-section{padding:12px 14px 4px;font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:#444}
.folder-row{display:flex;align-items:center;gap:7px;padding:9px 12px;cursor:pointer;border-left:3px solid transparent;min-height:40px;position:relative}
.folder-row.open{background:var(--row-hover);border-left-color:var(--t3)}
.folder-row .fn{font-size:14px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--folder-name)}
.folder-row .chev{font-size:11px;color:var(--t3);transition:transform .2s}
.folder-row.open .chev{transform:rotate(90deg)}
.folder-row .factions{display:none;gap:3px}
.folder-row:hover .factions{display:flex}
.folder-row:hover .chev{display:none}
.faction-btn{background:transparent;border:1px solid var(--faction-border);border-radius:4px;color:var(--faction-color);width:24px;height:24px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.topics-list{overflow:hidden;max-height:0;transition:max-height .3s ease}
.topics-list.open{max-height:600px}
.topic-row{display:flex;align-items:center;gap:6px;padding:8px 12px 8px 30px;cursor:pointer;border-left:3px solid transparent;min-height:38px}
.topic-row.active{background:var(--row-active);border-left-color:var(--gold)}
.topic-row .tn{font-size:13px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--topic-name)}
.topic-row.active .tn{color:var(--t)}
.topic-row .tactions{display:flex;gap:3px}
.add-topic-btn{padding:6px 12px 6px 30px;font-size:12px;color:var(--t3);cursor:pointer;min-height:32px;display:flex;align-items:center}
.add-folder-btn{margin:6px 12px 10px;padding:9px;background:transparent;border:1px dashed var(--faction-border);border-radius:7px;color:var(--faction-color);font-size:12px;cursor:pointer;width:calc(100% - 24px);text-align:left}
.sb-overlay{display:none;position:fixed;inset:0;background:var(--sb-overlay);z-index:49}
.sb-overlay.show{display:block}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:var(--bg)}
.topbar{padding:10px 16px;border-bottom:1px solid var(--b);background:var(--s);flex-shrink:0;gap:8px;overflow:hidden;max-height:200px;transition:max-height .25s,padding .25s,opacity .25s,background .3s;opacity:1}
.topbar.hidden{max-height:0;padding-top:0;padding-bottom:0;border-bottom:none;opacity:0}
.topbar-left{display:flex;align-items:flex-start;gap:10px}
.menu-btn{width:36px;height:36px;background:transparent;border:1px solid var(--b);border-radius:7px;color:var(--t3);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.topbar h2{font-size:14px;font-weight:700;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.breadcrumb{font-size:11px;color:var(--t3);margin-bottom:2px}
.breadcrumb span{color:var(--gold)}
.tb-actions-row{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.topbar-toggle{display:flex;align-items:center;justify-content:center;height:24px;background:var(--s);border-bottom:1px solid var(--b);cursor:pointer;flex-shrink:0}
.topbar-toggle-icon{font-size:16px;color:var(--gold);font-weight:900;line-height:1}
.content{flex:1;padding:18px;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg)}
/* BUTTONS */
.btn{padding:7px 13px;border-radius:7px;font-size:12px;cursor:pointer;font-weight:600;transition:all .15s;border:none;white-space:nowrap;font-family:inherit}
.btn-gold{background:var(--gold);color:#000}
.btn-gold:active{background:var(--gold2)}
.btn-ghost{background:transparent;color:var(--t3);border:1px solid var(--b)}
.btn-ghost:active{color:var(--t)}
.btn-red{background:transparent;color:var(--red);border:1px solid var(--red)}
.btn-sm{padding:5px 10px;font-size:11px}
/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:260px;gap:10px;color:var(--t3);text-align:center}
.empty .ei{font-size:44px}
.empty h3{font-size:20px;font-weight:900;color:var(--empty-h)}
.empty p{font-size:13px;max-width:260px;line-height:1.6}
/* TOC */
.toc-hdr{margin-bottom:18px}
.toc-hdr h3{font-size:20px;font-weight:900;margin-bottom:4px;color:var(--t)}
.toc-hdr p{font-size:12px;color:var(--t3)}
.toc-table{width:100%;border-collapse:collapse;background:var(--card-bg);border-radius:10px;overflow:hidden;border:1px solid var(--b)}
.toc-table thead tr{background:var(--toc-head)}
.toc-table th{padding:9px 14px;text-align:left;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);font-weight:500}
.toc-table tbody tr{border-top:1px solid var(--b);cursor:pointer}
.toc-table tbody tr:active{background:var(--row-hover)}
.toc-table td{padding:12px 14px;font-size:13px;color:var(--t)}
.tc-num{color:var(--t3);font-size:11px;width:32px}
.tc-title{font-weight:700}
.tc-acts{display:flex;gap:5px;justify-content:flex-end}
.tc-btn{background:transparent;border:1px solid var(--b);border-radius:5px;padding:4px 8px;font-size:10px;cursor:pointer;color:var(--t3);font-family:inherit}
.tc-btn.prs{color:var(--gold);border-color:var(--gold)}
.tc-btn.del:active{color:var(--red);border-color:var(--red)}
.dhandle{color:var(--handle);cursor:grab;font-size:14px;padding:0 4px;user-select:none}
tr.drag-over{border-top:2px solid var(--gold)!important}
tr.dragging{opacity:.35}
@media(max-width:640px){.tc-btn.prs,.tc-btn.del{display:none}}
/* SLIDE */
.slide-view{display:flex;flex-direction:column;height:100%;gap:8px;user-select:none}
.slide-stage{flex:1;position:relative;overflow:hidden;min-height:0;border-radius:14px;touch-action:pan-y}
.slide-card{position:absolute;inset:0;background:var(--card-bg);border:1px solid var(--b);border-radius:14px;padding:28px 32px;display:flex;flex-direction:column;gap:22px;overflow:hidden;transition:transform .32s cubic-bezier(.4,0,.2,1),opacity .32s;will-change:transform,opacity}
.slide-card.swipe-left{transform:translateX(-100%);opacity:0}
.slide-card.swipe-right{transform:translateX(100%);opacity:0}
.slide-card.incoming-right{transform:translateX(100%);opacity:0;transition:none}
.slide-card.incoming-left{transform:translateX(-100%);opacity:0;transition:none}
.slide-card.center{transform:translateX(0);opacity:1}
.slide-card.dragging-card{transition:none}
.slide-pg-num{display:inline-block;font-size:13px;font-weight:700;color:var(--gold);background:#f5c84218;border:1px solid #f5c84244;border-radius:6px;padding:3px 10px;margin-bottom:8px}
.slide-stitle{font-size:30px;font-weight:900;line-height:1.15;border-bottom:1px solid var(--b);padding-bottom:18px;flex-shrink:0;color:var(--t);cursor:pointer;border-radius:8px;transition:background .15s}
.slide-stitle:hover{background:#f5c84214}
.slide-stitle.copied{background:#f5c84233}
.slide-stitle-text{user-select:text;-webkit-user-select:text}
.slide-bullets{display:flex;flex-direction:column;gap:14px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sbullet{display:flex;align-items:flex-start;gap:12px;font-size:20px;font-weight:500;line-height:1.4;color:var(--t);cursor:pointer;border-radius:8px;padding:4px 6px;margin:-4px -6px;transition:background .15s}
.sbullet:hover{background:#f5c84214}
.sbullet.copied{background:#f5c84233}
.sbullet-text{user-select:text;-webkit-user-select:text}
.sbullet-dot{width:8px;height:8px;min-width:8px;background:var(--gold);border-radius:50%;margin-top:9px;flex-shrink:0}
.sbullet-num{width:22px;height:22px;min-width:22px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#000;margin-top:2px;flex-shrink:0}
@media(max-width:640px){.sbullet-text{user-select:none;-webkit-user-select:none}.slide-stitle-text{user-select:none;-webkit-user-select:none}}
/* QUOTE */
.slide-quote-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 0;display:flex;align-items:flex-start}
.slide-quote{position:relative;padding:22px 26px;border-left:4px solid var(--gold);background:#f5c84210;border-radius:0 12px 12px 0;width:100%}
.slide-quote-mark{font-size:64px;line-height:1;color:var(--gold);font-family:Georgia,serif;position:absolute;top:-8px;left:10px;opacity:.5}
.slide-quote-text{font-size:22px;font-weight:600;font-style:italic;line-height:1.55;color:var(--t);padding-left:28px}
.slide-quote-author{margin-top:14px;font-size:15px;font-weight:700;color:var(--gold);padding-left:28px}
/* SLIDE ADD BTN */
.slide-add-btn{width:32px;height:32px;border-radius:50%;background:var(--gold);border:none;color:#000;font-size:18px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:4px}
/* BIG NAV */
.big-nav{display:flex;align-items:center;gap:10px;flex-shrink:0;padding:2px 0}
.big-nav-btn{flex:0 0 56px;height:46px;border-radius:10px;background:var(--gold);border:none;color:#000;font-size:22px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center}
.big-nav-btn:active{background:var(--gold2)}
.big-nav-btn[disabled]{opacity:.25;cursor:default}
.page-counter{flex:1;text-align:center;font-size:18px;font-weight:700;color:var(--gold)}
/* TOAST */
.autosave-toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--toast-bg);border:1px solid var(--toast-border);border-radius:20px;padding:6px 16px;font-size:11px;color:var(--t3);z-index:999;pointer-events:none;opacity:0;transition:opacity .3s}
.autosave-toast.show{opacity:1}
/* MODAL */
.moverlay{position:fixed;inset:0;background:var(--overlay);z-index:600;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:600px){.moverlay{align-items:center}}
.modal{background:var(--modal-bg);border:1px solid var(--b);border-radius:16px 16px 0 0;padding:24px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
@media(min-width:600px){.modal{border-radius:14px}}
.modal-handle{width:40px;height:4px;background:var(--b);border-radius:2px;margin:0 auto 20px}
.modal h3{font-size:18px;font-weight:700;margin-bottom:16px;color:var(--t)}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:10px;color:var(--t3);margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase}
.fg input,.fg select{width:100%;background:var(--input-bg);border:1px solid var(--b);border-radius:8px;padding:11px 13px;color:var(--t);font-size:15px;font-family:inherit;outline:none;min-height:44px;-webkit-appearance:none}
.fg input:focus,.fg select:focus{border-color:var(--gold)}
.blist{display:flex;flex-direction:column;gap:8px}
.brow{display:flex;gap:6px;align-items:flex-start}
.brow textarea{flex:1;background:var(--input-bg);border:1px solid var(--b);border-radius:8px;padding:11px 13px;color:var(--t);font-size:15px;font-family:inherit;outline:none;min-height:44px;resize:none;overflow:hidden;line-height:1.5}
.brow textarea:focus{border-color:var(--gold)}
.bnewline,.bdel{background:transparent;border:1px solid var(--b);border-radius:7px;color:var(--t3);width:44px;height:44px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;text-align:center;line-height:1.2;font-family:inherit}
.bdel:active{border-color:var(--red);color:var(--red)}
.bnewline:active{border-color:var(--gold);color:var(--gold)}
.badd{background:transparent;border:1px dashed var(--b);border-radius:7px;color:var(--t3);padding:10px 14px;cursor:pointer;font-size:13px;font-family:inherit;margin-top:6px;width:100%;text-align:left;min-height:44px}
.badd:active{border-color:var(--gold);color:var(--gold)}
.macts{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--b);flex-wrap:wrap}
.list-type-toggle{display:flex;gap:6px;margin-bottom:12px}
.ltt-btn{flex:1;padding:8px;border-radius:7px;border:1px solid var(--b);background:transparent;color:var(--t3);font-size:11px;font-family:inherit;cursor:pointer}
.ltt-btn.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700}
.confirm-box{background:var(--modal-bg);border:1px solid var(--b);border-radius:16px 16px 0 0;padding:24px;width:100%;max-width:560px}
@media(min-width:600px){.confirm-box{border-radius:14px}}
.confirm-box h3{font-size:16px;font-weight:700;margin-bottom:8px;color:var(--t)}
.confirm-box p{font-size:13px;color:var(--t3);margin-bottom:20px;line-height:1.6}
/* RESPONSIVE */
@media(max-width:640px){
  .sidebar{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .menu-btn{display:flex}
  .slide-stitle{font-size:24px}
  .sbullet{font-size:18px}
  .slide-card{padding:20px 18px}
}
@media(min-width:641px){.menu-btn{display:none}}
/* SIGN-IN SCREEN */
.signin-screen{position:fixed;inset:0;background:#0f0f0f;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:24px;padding:40px}
body.light .signin-screen{background:#f4f4f4}
.signin-logo{font-size:52px;font-weight:900;color:var(--gold)}
.signin-tagline{font-size:15px;color:var(--t3);text-align:center;line-height:1.6;max-width:280px}
.signin-google-btn{display:flex;align-items:center;gap:10px;padding:14px 28px;background:var(--gold);color:#000;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
.signin-google-btn:active{background:var(--gold2)}
.signin-note{font-size:12px;color:var(--t3);text-align:center;max-width:260px;line-height:1.5}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="sb-overlay" id="sb-overlay"></div>
<div id="autosave-toast" class="autosave-toast"></div>

<script>
// ── STORAGE ──
var SAVE_KEY='speakdeck_v4';
var THEME_KEY='speakdeck_theme';

// Apply theme immediately
(function(){try{if(localStorage.getItem(THEME_KEY)==='light')document.body.classList.add('light');}catch(e){}})();

// ── DEFAULTS ──
var DEFAULT={
  folders:[
    {id:1,name:'Conference Talks',open:true,topics:[
      {id:11,name:'Leadership Talk',pages:[
        {title:'Opening Strong',listType:'bullet',bullets:['Start with a story that connects','Establish your credibility early','State the problem you will solve','Promise the transformation ahead']},
        {title:'The Core Problem',listType:'bullet',bullets:['70% of leaders feel disconnected','Communication gaps cost millions','Employees want to be heard','Traditional hierarchies are failing']},
        {title:'Call to Action',listType:'bullet',bullets:['Start tomorrow, not next Monday','Pick one habit and master it','Share this with your team today','Commit to a 30-day challenge']},
      ]},
      {id:12,name:'Innovation Future',pages:[
        {title:'The AI Shift',listType:'bullet',bullets:['Every job will be touched by AI','Curiosity is the new job security','Build tools, not just use them','Humans + AI beat AI alone']},
        {title:'What To Do Now',listType:'number',bullets:['Learn one AI tool this week','Experiment in low-stakes areas','Share learnings with your team']},
      ]},
    ]},
    {id:2,name:'Sales Pitches',open:false,topics:[
      {id:21,name:'Q3 Product Pitch',pages:[
        {title:'The Problem We Solve',listType:'bullet',bullets:['Teams waste 30% of time in meetings','No single source of truth exists','Decisions take 3x longer than needed']},
        {title:'Our Solution',listType:'number',bullets:['One dashboard for everything','AI-driven decision summaries','Real-time collaboration built in','Setup in under 10 minutes']},
      ]},
    ]},
  ],
  selectedTopicId:11,view:'toc',page:0
};

function loadData(){
  try{
    var r=localStorage.getItem(SAVE_KEY);
    if(r){
      var d=JSON.parse(r);
      var merged=Object.assign({},DEFAULT,d);
      // Sanitize all pages — ensure every page has required fields
      if(merged.folders){
        merged.folders.forEach(function(f){
          if(!f.topics) f.topics=[];
          f.topics.forEach(function(t){
            if(!t.pages) t.pages=[];
            t.pages=t.pages.filter(function(p){return p&&p.title;}).map(function(p){
              return {
                title:p.title||'Untitled',
                listType:p.listType||'bullet',
                bullets:Array.isArray(p.bullets)?p.bullets:[],
                quoteText:p.quoteText||'',
                quoteAuthor:p.quoteAuthor||''
              };
            });
          });
        });
      }
      return merged;
    }
  }catch(e){}
  return Object.assign({},DEFAULT);
}
function saveData(){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify({folders:S.folders,selectedTopicId:S.selectedTopicId,view:S.view,page:S.page}));}catch(e){}
  if(window._fb&&window._fbUser&&window._fbUser.uid){
    // Strip 'open' state before sending to cloud — it's a local UI preference
    var foldersForCloud=S.folders.map(function(f){
      var fc=Object.assign({},f);
      delete fc.open;
      fc.topics=f.topics.map(function(t){ return Object.assign({},t); });
      return fc;
    });
    window._fb.save(window._fbUser.uid,{folders:foldersForCloud,selectedTopicId:S.selectedTopicId,updatedAt:Date.now()});
  }
}
function saveNav(){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify({folders:S.folders,selectedTopicId:S.selectedTopicId,view:S.view,page:S.page}));}catch(e){}
}

function showToast(msg){
  var t=document.getElementById('autosave-toast');
  if(!t)return;
  t.textContent=msg;t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer=setTimeout(function(){t.classList.remove('show');},2000);
}

// ── STATE ──
var S=loadData();
S.modal=null;S.editPageIdx=null;S.confirm=null;
S.editFolderTarget=null;S.editTopicTarget=null;
S.sidebarOpen=false;S.insertAfter=null;S.topbarHidden=false;
S.user=null;

// Firebase placeholders
window._fb=null;window._fbUser=null;

// ── HELPERS ──
function allTopics(){return S.folders.reduce(function(a,f){return a.concat(f.topics);},[]);}
function getTopic(){return allTopics().filter(function(t){return t.id===S.selectedTopicId;})[0];}
function getFolderOf(tid){return S.folders.filter(function(f){return f.topics.some(function(t){return t.id===tid;});})[0];}
function el(tag,cls){var e=document.createElement(tag);if(cls)e.className=cls;return e;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function sortedFolders(){return S.folders.slice().sort(function(a,b){return a.name.localeCompare(b.name,undefined,{numeric:true,sensitivity:'base'});});}
function sortedTopics(f){return f.topics.slice().sort(function(a,b){return a.name.localeCompare(b.name,undefined,{numeric:true,sensitivity:'base'});});}

function copyText(text,ok,fail){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(ok).catch(function(){fb();});
  }else{fb();}
  function fb(){
    try{
      var ta=document.createElement('textarea');
      ta.value=text;ta.style.cssText='position:fixed;top:0;left:0;width:1px;height:1px;opacity:0';
      document.body.appendChild(ta);ta.focus();ta.select();ta.setSelectionRange(0,99999);
      var res=document.execCommand('copy');document.body.removeChild(ta);
      if(res)ok();else fail();
    }catch(e){fail();}
  }
}

function toggleSidebar(open){
  S.sidebarOpen=open!==undefined?open:!S.sidebarOpen;
  var sb=document.querySelector('.sidebar');
  var ov=document.getElementById('sb-overlay');
  if(sb)sb.classList.toggle('open',S.sidebarOpen);
  if(ov)ov.classList.toggle('show',S.sidebarOpen);
}

function toggleTheme(){
  var l=document.body.classList.toggle('light');
  try{localStorage.setItem(THEME_KEY,l?'light':'dark');}catch(e){}
  render();
}

// ── SWIPE ──
function addSwipe(stage,getCard,onNext,onPrev){
  var startX=0,startY=0,dx=0,dragging=false,lockAxis=null,threshold=55;
  function onStart(x,y){startX=x;startY=y;dx=0;dragging=true;lockAxis=null;var c=getCard();if(c)c.classList.add('dragging-card');}
  function onMove(x,y){
    if(!dragging)return;
    var dX=x-startX,dY=y-startY;
    if(!lockAxis)lockAxis=Math.abs(dX)>Math.abs(dY)?'x':'y';
    if(lockAxis==='y')return;
    dx=dX;var c=getCard();
    if(c){c.style.transform='translateX('+dx+'px)';c.style.opacity=String(1-Math.min(Math.abs(dx)/280,.45));}
  }
  function onEnd(){
    if(!dragging)return;dragging=false;var c=getCard();
    if(c){c.classList.remove('dragging-card');c.style.transform='';c.style.opacity='';}
    if(lockAxis==='y'||!lockAxis)return;
    if(dx<-threshold)onNext();else if(dx>threshold)onPrev();
  }
  stage.addEventListener('touchstart',function(e){var t=e.touches[0];onStart(t.clientX,t.clientY);},{passive:true});
  stage.addEventListener('touchmove',function(e){if(lockAxis==='x')e.preventDefault();var t=e.touches[0];onMove(t.clientX,t.clientY);},{passive:false});
  stage.addEventListener('touchend',onEnd,{passive:true});
  stage.addEventListener('mousedown',function(e){onStart(e.clientX,e.clientY);});
  stage.addEventListener('mousemove',function(e){if(dragging)onMove(e.clientX,e.clientY);});
  stage.addEventListener('mouseup',onEnd);
  stage.addEventListener('mouseleave',onEnd);
}

function animateSlide(stage,oldCard,dir,buildNew){
  var outClass=dir==='next'?'swipe-left':'swipe-right';
  var inClass=dir==='next'?'incoming-right':'incoming-left';
  oldCard.classList.add(outClass);
  var newCard=buildNew();newCard.classList.add(inClass);
  stage.appendChild(newCard);
  requestAnimationFrame(function(){requestAnimationFrame(function(){newCard.classList.remove(inClass);newCard.classList.add('center');});});
  oldCard.addEventListener('transitionend',function(){oldCard.remove();},{once:true});
  return newCard;
}

function buildSlideCard(topic,idx){
  var page=topic.pages[idx];
  if(!page) page={title:'',listType:'bullet',bullets:[]};
  var listType=page.listType||'bullet';
  var card=el('div','slide-card center');
  var body='';
  if(listType==='quote'){
    var qText=page.quoteText||'';
    var qFull=qText+(page.quoteAuthor?'\n— '+page.quoteAuthor:'');
    body='<div class="slide-quote-wrap"><div class="slide-quote" data-qtext="'+esc(qFull)+'"><div class="slide-quote-mark">"</div><div class="slide-quote-text sbullet-text">'+esc(qText)+'</div>'+(page.quoteAuthor?'<div class="slide-quote-author">— '+esc(page.quoteAuthor)+'</div>':'')+'</div></div>';
  } else {
    var isNum=listType==='number';
    body='<div class="slide-bullets">'+(page.bullets||[]).map(function(b,i){
      return '<div class="sbullet" data-btext="'+esc(b)+'">'+(isNum?'<div class="sbullet-num">'+(i+1)+'</div>':'<div class="sbullet-dot"></div>')+'<div class="sbullet-text">'+esc(b).replace(/\n/g,'<br>')+'</div></div>';
    }).join('')+'</div>';
  }
  card.innerHTML='<div><div class="slide-pg-num">Page '+(idx+1)+' of '+topic.pages.length+'</div><div class="slide-stitle" data-titletext="'+esc(page.title)+'"><span class="slide-stitle-text">'+esc(page.title)+'</span></div></div>'+body;

  // Long-press copy title
  var titleEl=card.querySelector('.slide-stitle');
  if(titleEl){
    var pt=null;
    titleEl.addEventListener('touchstart',function(){pt=setTimeout(function(){copyText(titleEl.dataset.titletext,function(){titleEl.classList.add('copied');showToast('Copied!');setTimeout(function(){titleEl.classList.remove('copied');},600);},function(){showToast('Copy failed');});},500);},{passive:true});
    titleEl.addEventListener('touchend',function(){clearTimeout(pt);},{passive:true});
    titleEl.addEventListener('touchmove',function(){clearTimeout(pt);},{passive:true});
  }
  // Long-press copy bullets
  card.querySelectorAll('.sbullet[data-btext]').forEach(function(row){
    var pt2=null;
    row.addEventListener('touchstart',function(){pt2=setTimeout(function(){copyText(row.dataset.btext,function(){row.classList.add('copied');showToast('Copied!');setTimeout(function(){row.classList.remove('copied');},600);},function(){showToast('Copy failed');});},500);},{passive:true});
    row.addEventListener('touchend',function(){clearTimeout(pt2);},{passive:true});
    row.addEventListener('touchmove',function(){clearTimeout(pt2);},{passive:true});
  });
  // Long-press copy quote
  var qEl=card.querySelector('.slide-quote[data-qtext]');
  if(qEl){
    var pt3=null;
    qEl.addEventListener('touchstart',function(){pt3=setTimeout(function(){copyText(qEl.dataset.qtext,function(){qEl.style.background='#f5c84233';showToast('Copied!');setTimeout(function(){qEl.style.background='';},600);},function(){showToast('Copy failed');});},500);},{passive:true});
    qEl.addEventListener('touchend',function(){clearTimeout(pt3);},{passive:true});
    qEl.addEventListener('touchmove',function(){clearTimeout(pt3);},{passive:true});
  }
  return card;
}

function renderSlideView(content,topic){
  var pages=topic.pages,idx=S.page;
  var d=el('div','slide-view');
  var dotsHTML='<span class="page-counter" id="page-ctr">'+(idx+1)+'/'+pages.length+'</span>';
  d.innerHTML='<div class="slide-stage" id="slide-stage"></div><div class="big-nav"><button class="big-nav-btn" id="sprev"'+(idx===0?' disabled':'')+'>←</button>'+dotsHTML+'<button class="big-nav-btn" id="snext"'+(idx===pages.length-1?' disabled':'')+'>→</button></div>';
  var stage=d.querySelector('#slide-stage');
  stage.appendChild(buildSlideCard(topic,idx));
  function goTo(ni,dir){
    if(ni<0||ni>=pages.length)return;
    S.page=ni;saveNav();
    var old=stage.querySelector('.slide-card');
    animateSlide(stage,old,dir,function(){return buildSlideCard(topic,ni);});
    var ctr=d.querySelector('#page-ctr');
    if(ctr)ctr.textContent=(ni+1)+'/'+pages.length;
    d.querySelector('#sprev').disabled=ni===0;
    d.querySelector('#snext').disabled=ni===pages.length-1;
  }
  d.querySelector('#sprev').addEventListener('click',function(){goTo(S.page-1,'prev');});
  d.querySelector('#snext').addEventListener('click',function(){goTo(S.page+1,'next');});
  d.querySelectorAll('.sdot').forEach(function(dot){dot.addEventListener('click',function(){var i=+dot.dataset.di;goTo(i,i>S.page?'next':'prev');});});
  addSwipe(stage,function(){return stage.querySelector('.slide-card');},function(){goTo(S.page+1,'next');},function(){goTo(S.page-1,'prev');});
  content.appendChild(d);
}

function renderTOC(content,topic){
  if(!topic.pages.length){
    content.innerHTML='<div class="toc-hdr"><h3>'+esc(topic.name)+'</h3><p>No pages yet</p></div><div class="empty" id="empty-add" style="cursor:pointer"><div class="ei">📄</div><p style="color:var(--gold);font-weight:700;font-size:15px">Tap to add a page</p></div>';
    content.querySelector('#empty-add').addEventListener('click',function(){S.modal='page';S.editPageIdx=null;S.insertAfter=null;render();});
    return;
  }
  var d=el('div');
  var rows=topic.pages.map(function(p,i){
    return '<tr data-idx="'+i+'"><td><span class="dhandle" draggable="true" data-drag="'+i+'">⠿</span></td><td class="tc-num">'+(i+1)+'</td><td class="tc-title" data-goto="'+i+'">'+esc(p.title)+'</td><td class="tc-acts"><button class="tc-btn prs" data-prs="'+i+'">▶</button><button class="tc-btn edt" data-edt="'+i+'">Edit</button><button class="tc-btn del" data-del="'+i+'">Del</button></td></tr>';
  }).join('');
  d.innerHTML='<div class="toc-hdr"><h3>'+esc(topic.name)+'</h3><p>'+topic.pages.length+' page'+(topic.pages.length!==1?'s':'')+' · tap to present · drag ⠿ to reorder</p></div><table class="toc-table"><thead><tr><th></th><th>#</th><th>Title</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';
  d.querySelectorAll('[data-goto]').forEach(function(c){c.addEventListener('click',function(){S.page=+c.dataset.goto;S.view='slide';saveNav();render();});});
  d.querySelectorAll('[data-prs]').forEach(function(b){b.addEventListener('click',function(){S.page=+b.dataset.prs;S.view='slide';saveNav();render();});});
  d.querySelectorAll('[data-edt]').forEach(function(b){b.addEventListener('click',function(){S.modal='page';S.editPageIdx=+b.dataset.edt;render();});});
  d.querySelectorAll('[data-del]').forEach(function(b){b.addEventListener('click',function(){S.modal='confirm';S.confirm={type:'del-page',idx:+b.dataset.del,label:'Delete "'+topic.pages[+b.dataset.del].title+'"?',desc:'This page will be permanently removed.'};render();});});
  var dragIdx=null;
  d.querySelectorAll('.dhandle').forEach(function(h){h.addEventListener('dragstart',function(){dragIdx=+h.dataset.drag;setTimeout(function(){h.closest('tr').classList.add('dragging');},0);});});
  d.querySelectorAll('tbody tr').forEach(function(row){
    row.addEventListener('dragover',function(e){e.preventDefault();row.classList.add('drag-over');});
    row.addEventListener('dragleave',function(){row.classList.remove('drag-over');});
    row.addEventListener('drop',function(e){e.preventDefault();row.classList.remove('drag-over');var to=+row.dataset.idx;if(dragIdx!==null&&dragIdx!==to){var m=topic.pages.splice(dragIdx,1)[0];topic.pages.splice(to,0,m);saveData();render();}dragIdx=null;});
  });
  content.appendChild(d);
}

function renderModal(app){
  var ov=el('div','moverlay');
  ov.addEventListener('click',function(e){
    if(e.target===ov){
      // Don't close the page modal by clicking outside — must use Cancel
      if(S.modal==='page') return;
      S.modal=null;S.insertAfter=null;render();
    }
  });

  if(S.modal==='page'){
    var topic=getTopic(),editing=S.editPageIdx!==null,ex=editing?topic.pages[S.editPageIdx]:null;
    var bullets=ex?(ex.bullets||[]).slice():['',''];
    var listType=(ex&&ex.listType)||'bullet';
    var m=el('div','modal');

      if(!token){ stopPolling(); return; }
      fsGet(uid, token).then(function(doc){
        if(!doc||!doc.fields) return;
        var data = fromFields(doc.fields);
        var cloudTime = data.updatedAt||0;
        if(cloudTime > _lastUpdatedAt && data.folders && data.folders.length){
          _lastUpdatedAt = cloudTime;
          S.folders = data.folders;
          if(data.selectedTopicId) S.selectedTopicId = data.selectedTopicId;
          saveNav(); render(); showToast('Synced ✓');
        }
      }).catch(function(){});
    }, 15000);
  }

  function stopPolling(){
    if(_unsubscribe){
      if(typeof _unsubscribe === 'function') _unsubscribe(); // Firestore unsubscribe
      else clearInterval(_unsubscribe); // REST interval
      _unsubscribe = null;
    }
  }

  function restSave(uid, data){
    var token = getToken();
    if(!token) return;
    fsSave(uid, token, data)
      .then(function(r){ if(r.ok) showToast('Synced ✓'); })
      .catch(function(){ showToast('Sync failed'); });
  }

  // ── Expose API ──
  window._fb = {
    signIn:  doSignIn,
    signOut: doSignOut,
    save: function(uid, data){
      _lastUpdatedAt = data.updatedAt || Date.now(); // mark our own save
      clearTimeout(window._fbSaveTimer);
      window._fbSaveTimer=setTimeout(function(){
        // Use Firestore SDK if loaded (faster), fallback to REST
        if(typeof firebase !== 'undefined' && firebase.firestore){
          try{
            firebase.firestore().collection('users').doc(uid).set(data)
              .then(function(){ showToast('Synced ✓'); })
              .catch(function(){ restSave(uid, data); });
            return;
          }catch(e){}
        }
        restSave(uid, data);
      }, 800);
    },
    subscribe: function(uid){ startPolling(uid); },
    unsubscribe: stopPolling
  };

  // ── Restore session on load ──
  var saved = getSavedUser();
  if(saved){
    var token = saved.idToken;
    var expired = saved.tokenExpiry && Date.now() > saved.tokenExpiry - 60000;
    if(!expired && token){
      window._fbUser = saved;
      S.user = saved;
      // Schedule token refresh based on remaining time
      var remaining = saved.tokenExpiry ? Math.floor((saved.tokenExpiry - Date.now()) / 1000) : 3600;
      loadGIS(function(){
        _tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: CLIENT_ID,
          scope: 'profile email https://www.googleapis.com/auth/datastore',
          callback: function(resp){
            if(resp.error) return;
            applyToken(resp, {uid:saved.uid,email:saved.email,displayName:saved.displayName,photoURL:saved.photoURL});
          }
        });
        scheduleTokenRefresh(remaining);
      });
      // Load latest cloud data silently
      fsGet(saved.uid, token).then(function(doc){
        if(doc&&doc.fields){
          var data=fromFields(doc.fields);
          if(data.folders&&data.folders.length){
            (function(){
                  // Preserve local open state when loading from cloud
                  var localOpen={};
                  S.folders.forEach(function(f){ localOpen[f.id]=f.open; });
                  S.folders=data.folders.map(function(f){
                    return Object.assign({},f,{open:localOpen[f.id]||false});
                  });
                })();
          } else {
            fsSave(saved.uid, token, {folders:S.folders.map(function(f){var fc=Object.assign({},f);delete fc.open;fc.topics=f.topics.map(function(t){return Object.assign({},t);});return fc;}),selectedTopicId:S.selectedTopicId,updatedAt:Date.now()});
          }
          if(data.selectedTopicId){ S.selectedTopicId=data.selectedTopicId; }
          saveNav();
        } else {
          fsSave(saved.uid, token, {folders:S.folders.map(function(f){var fc=Object.assign({},f);delete fc.open;fc.topics=f.topics.map(function(t){return Object.assign({},t);});return fc;}),selectedTopicId:S.selectedTopicId,updatedAt:Date.now()});
        }
        render();
        startPolling(saved.uid);
      }).catch(function(){
        render();
      });
    } else {
      // Token expired — clear and show sign-in
      clearUser();
      render();
    }
  }
})();


// Initial render
try{ render(); }catch(e){ console.error("Render error:",e); }

</script>
</body>
</html>
