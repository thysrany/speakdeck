<!-- PWA Manifest (inline) -->
<script>
const manifestData = {
  name: "SpeakDeck 2.0",
  short_name: "SpeakDeck",
  description: "Speaker notes app",
  start_url: "./",
  display: "fullscreen",
  orientation: "portrait-primary",
  background_color: "#0f0f0f",
  theme_color: "#0f0f0f",
  icons: [
    { src: buildIcon(192), sizes: "192x192", type: "image/png", purpose: "any maskable" },
    { src: buildIcon(512), sizes: "512x512", type: "image/png", purpose: "any maskable" }
  ]
};
function buildIcon(size){
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 512 512"><rect width="512" height="512" rx="100" fill="#0f0f0f"/><rect width="512" height="512" rx="100" fill="#1a1a1a"/><circle cx="256" cy="256" r="200" fill="#f5c842" opacity="0.08"/><text x="256" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="180" fill="#f5c842">S</text><text x="256" y="340" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="72" fill="#f5c842" letter-spacing="8">DECK</text></svg>`;
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  const img = new Image();
  const blob = new Blob([svg], {type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  return new Promise(res => {
    img.onload = () => { ctx.drawImage(img,0,0,size,size); URL.revokeObjectURL(url); res(canvas.toDataURL('image/png')); };
    img.src = url;
  });
}

// Build manifest with real PNG icon data URIs
(async()=>{
  const [icon192, icon512] = await Promise.all([buildIcon(192), buildIcon(512)]);
  manifestData.icons[0].src = icon192;
  manifestData.icons[1].src = icon512;
  const blob = new Blob([JSON.stringify(manifestData)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest'; link.href = url;
  document.head.appendChild(link);

  // Apple touch icon
  const appleLink = document.createElement('link');
  appleLink.rel = 'apple-touch-icon';
  appleLink.href = icon192;
  document.head.appendChild(appleLink);

  // Favicon
  const favicon = document.createElement('link');
  favicon.rel = 'icon'; favicon.type = 'image/png'; favicon.href = icon192;
  document.head.appendChild(favicon);
})();

// Register service worker for offline use
if('serviceWorker' in navigator){
  const swCode = `
    const CACHE='speakdeck-v1';
    const ASSETS=['./'];
    self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS))));
    self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('./')))));
  `;
  const swBlob = new Blob([swCode],{type:'application/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
</script>

<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Open Sans',sans-serif;}

/* ── DARK THEME (default) ── */
:root{
  --gold:#f5c842;--gold2:#c9a130;
  --bg:#0f0f0f;--s:#1a1a1a;--s2:#222;--b:#2a2a2a;
  --t:#f0ece3;--t2:#ccc;--t3:#888;
  --folder-name:#e0dcd3;
  --topic-name:#ccc;
  --row-hover:#1e1e1e;
  --row-active:#222;
  --toc-head:#1e1e1e;
  --card-bg:#1a1a1a;
  --modal-bg:#1c1c1c;
  --input-bg:#111;
  --handle:#888;
  --faction-border:#555;
  --faction-color:#aaa;
  --overlay:rgba(0,0,0,.85);
  --red:#c0392b;
  --sb-overlay:rgba(0,0,0,.6);
  --toast-bg:#1e1e1e;
  --toast-border:#333;
  --empty-h:#444;
}

/* ── LIGHT THEME ── */
body.light{
  --bg:#f4f4f4;--s:#ffffff;--s2:#f0f0f0;--b:#ddd;
  --t:#1a1a1a;--t2:#333;--t3:#666;
  --folder-name:#1a1a1a;
  --topic-name:#333;
  --row-hover:#f0f0f0;
  --row-active:#fff8e1;
  --toc-head:#f5f5f5;
  --card-bg:#ffffff;
  --modal-bg:#ffffff;
  --input-bg:#f8f8f8;
  --handle:#999;
  --faction-border:#ccc;
  --faction-color:#555;
  --overlay:rgba(0,0,0,.5);
  --sb-overlay:rgba(0,0,0,.3);
  --toast-bg:#fff;
  --toast-border:#ddd;
  --empty-h:#999;
}

body{background:var(--bg);color:var(--t);transition:background .3s,color .3s}
.app{display:flex;height:100vh;height:100dvh}

/* ── THEME TOGGLE ── */
.theme-btn{width:34px;height:34px;border-radius:50%;background:transparent;border:1px solid var(--faction-border);color:var(--t3);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;margin-left:4px}
.theme-btn:active{border-color:var(--gold);color:var(--gold)}

/* ── SIDEBAR ── */
.sidebar{width:250px;min-width:250px;background:var(--s);border-right:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden;transition:transform .25s ease,background .3s;z-index:50}
.logo{padding:20px 16px 14px;border-bottom:1px solid var(--b)}
.logo h1{font-family:'Open Sans',sans-serif;font-size:20px;font-weight:800;color:var(--gold)}
.logo p{font-size:10px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.sb-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:12px}
.sb-section{padding:14px 16px 5px;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--t3)}
.folder-row{display:flex;align-items:center;gap:7px;padding:9px 12px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;position:relative;min-height:40px}
.folder-row:active{background:var(--row-hover)}
.folder-row.open{background:var(--row-hover);border-left-color:var(--t3)}
.folder-row .fn{font-size:14px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--folder-name)}
.folder-row .chev{font-size:12px;color:var(--t3);transition:transform .2s;flex-shrink:0}
.folder-row.open .chev{transform:rotate(90deg)}
.folder-row .factions{display:none;gap:3px;flex-shrink:0}
.folder-row:hover .factions,.folder-row.show-actions .factions{display:flex}
.folder-row:hover .chev,.folder-row.show-actions .chev{display:none}
.faction-btn{background:transparent;border:1px solid var(--faction-border);border-radius:4px;color:var(--faction-color);width:24px;height:24px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;font-family:'Open Sans',sans-serif;transition:all .1s}
.faction-btn:active{color:var(--t);border-color:var(--t3)}
.faction-btn.del:active{color:var(--red);border-color:var(--red)}
.topics-list{overflow:hidden;max-height:0;transition:max-height .3s ease}
.topics-list.open{max-height:600px}
.topic-row{display:flex;align-items:center;gap:7px;padding:8px 12px 8px 30px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;position:relative;min-height:38px}
.topic-row:active{background:var(--row-hover)}
.topic-row.active{background:var(--row-active);border-left-color:var(--gold)}
.topic-row .tn{font-size:13px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--topic-name)}
.topic-row.active .tn{color:var(--t)}
.topic-row .tpc{display:none}
.topic-row .tactions{display:flex;gap:3px;flex-shrink:0}
.add-topic-btn{display:flex;align-items:center;gap:5px;padding:6px 12px 6px 30px;font-size:12px;color:var(--t3);cursor:pointer;transition:color .15s;min-height:32px}
.add-topic-btn:active{color:var(--gold)}
.add-folder-btn{margin:6px 12px 10px;padding:9px;background:transparent;border:1px dashed var(--faction-border);border-radius:7px;color:var(--faction-color);font-size:12px;cursor:pointer;width:calc(100% - 24px);text-align:left;transition:all .15s;font-family:'Open Sans',sans-serif}
.add-folder-btn:active{border-color:var(--gold);color:var(--gold)}

/* ── MOBILE OVERLAY ── */
.sb-overlay{display:none;position:fixed;inset:0;background:var(--sb-overlay);z-index:49}
.sb-overlay.show{display:block}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{display:flex;align-items:flex-start;padding:10px 16px;border-bottom:1px solid var(--b);background:var(--s);flex-shrink:0;gap:8px;transition:background .3s}
.topbar-left{display:flex;align-items:flex-start;gap:10px;min-width:0;flex:1}
.tb-actions-row{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.menu-btn{width:36px;height:36px;background:transparent;border:1px solid var(--b);border-radius:7px;color:var(--t3);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Open Sans',sans-serif;margin-top:2px}
.topbar h2{font-family:'Open Sans',sans-serif;font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t)}
.topbar-actions{display:flex;gap:6px;flex-shrink:0;align-items:center}
.btn{padding:8px 14px;border-radius:7px;font-size:12px;cursor:pointer;font-family:'Open Sans',sans-serif;font-weight:500;transition:all .15s;border:none;min-height:36px;white-space:nowrap}
.btn-gold{background:var(--gold);color:#000}
.btn-gold:active{background:var(--gold2)}
.btn-ghost{background:transparent;color:var(--t3);border:1px solid var(--b)}
.btn-ghost:active{color:var(--t);border-color:var(--t3)}
.btn-red{background:transparent;color:var(--red);border:1px solid var(--red)}
.btn-red:active{background:#c0392b18}
.btn-sm{padding:6px 10px;font-size:11px;min-height:32px}
.content{flex:1;padding:18px;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg);transition:background .3s}

/* ── EMPTY ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:260px;gap:10px;color:var(--t3);text-align:center}
.empty .ei{font-size:44px}
.empty h3{font-family:'Open Sans',sans-serif;font-size:20px;font-weight:800;color:var(--empty-h)}
.empty p{font-size:13px;max-width:260px;line-height:1.6}

/* ── TOC ── */
.toc-hdr{margin-bottom:18px}
.toc-hdr h3{font-family:'Open Sans',sans-serif;font-size:22px;font-weight:800;margin-bottom:4px;color:var(--t)}
.toc-hdr p{font-size:12px;color:var(--t3)}
.toc-table{width:100%;border-collapse:collapse;background:var(--card-bg);border-radius:10px;overflow:hidden;border:1px solid var(--b)}
.toc-table thead tr{background:var(--toc-head)}
.toc-table th{padding:10px 14px;text-align:left;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);font-weight:500}
.toc-table tbody tr{border-top:1px solid var(--b);cursor:pointer}
.toc-table tbody tr:active{background:var(--row-hover)}
.toc-table td{padding:13px 14px;font-size:13px;color:var(--t)}
.tc-num{color:var(--t3);font-size:11px;width:32px}
.tc-title{font-weight:600;color:var(--t)}
.tc-acts{display:flex;gap:5px;justify-content:flex-end;flex-wrap:wrap}
.tc-btn{background:transparent;border:1px solid var(--b);border-radius:5px;padding:5px 9px;font-size:10px;cursor:pointer;color:var(--t3);font-family:'Open Sans',sans-serif;min-height:30px}
.tc-btn:active{color:var(--t);border-color:var(--t3)}
.tc-btn.prs,.tc-btn.del{display:inline-flex}
@media(max-width:640px){.tc-btn.prs,.tc-btn.del{display:none}}
.tc-btn.prs{color:var(--gold);border-color:var(--gold)}
.tc-btn.edt:active{color:var(--gold);border-color:var(--gold)}
.tc-btn.del:active{color:var(--red);border-color:var(--red)}
.dhandle{color:var(--handle);cursor:grab;font-size:15px;padding:0 4px;user-select:none}
.dhandle:hover{color:var(--t2)}
tr.drag-over{border-top:2px solid var(--gold)!important}
tr.dragging{opacity:.35}

/* ── SLIDE VIEW ── */
.slide-view{display:flex;flex-direction:column;height:100%;gap:12px;user-select:none}
.prog-bar{height:3px;background:var(--b);border-radius:2px;flex-shrink:0}
.prog-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .3s}
.slide-stage{flex:1;position:relative;overflow:hidden;min-height:0;border-radius:14px;touch-action:pan-y}
.slide-card{position:absolute;inset:0;background:var(--card-bg);border:1px solid var(--b);border-radius:14px;padding:32px 36px;display:flex;flex-direction:column;gap:24px;overflow:hidden;transition:transform .32s cubic-bezier(.4,0,.2,1),opacity .32s;will-change:transform,opacity}
.slide-card.swipe-left{transform:translateX(-100%);opacity:0}
.slide-card.swipe-right{transform:translateX(100%);opacity:0}
.slide-card.incoming-right{transform:translateX(100%);opacity:0;transition:none}
.slide-card.incoming-left{transform:translateX(-100%);opacity:0;transition:none}
.slide-card.center{transform:translateX(0);opacity:1}
.slide-card.dragging-card{transition:none}
.slide-stitle{font-family:'Open Sans',sans-serif;font-size:32px;font-weight:800;line-height:1.15;border-bottom:1px solid var(--b);padding-bottom:20px;flex-shrink:0;color:var(--t)}
.slide-bullets{display:flex;flex-direction:column;gap:16px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sbullet{display:flex;align-items:flex-start;gap:14px;font-size:22px;font-weight:500;line-height:1.4;color:var(--t);cursor:pointer;border-radius:8px;padding:4px 6px;margin:-4px -6px;transition:background .15s}
.sbullet:hover{background:#f5c84214}
.sbullet.copied{background:#f5c84233}
.sbullet-text{user-select:text;-webkit-user-select:text}
@media(max-width:640px){.sbullet-text{user-select:none;-webkit-user-select:none}}
.sbullet-dot{width:8px;height:8px;min-width:8px;background:var(--gold);border-radius:50%;margin-top:10px;flex-shrink:0}
.slide-dots{display:flex;align-items:center;justify-content:center;gap:7px;flex-shrink:0;padding:4px 0}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--b);transition:all .2s;cursor:pointer;min-width:7px}
.sdot.active{background:var(--gold);width:20px;border-radius:4px}
.slide-pg-num{display:inline-block;font-size:13px;font-weight:700;color:var(--gold);background:#f5c84218;border:1px solid #f5c84244;border-radius:6px;padding:3px 10px;margin-bottom:10px;letter-spacing:.3px}
.sbullet-num{width:24px;height:24px;min-width:24px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#000;margin-top:2px;flex-shrink:0}

/* ── SLIDE HEADER ROW ── */
.slide-header{display:flex;align-items:center;justify-content:flex-end;flex-shrink:0}
.slide-add-btn{width:32px;height:32px;border-radius:50%;background:var(--gold);border:none;color:#000;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:background .15s,transform .1s;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.slide-add-btn:active{background:var(--gold2);transform:scale(.92)}

.big-nav{display:flex;gap:10px;flex-shrink:0;padding:2px 0}
.big-nav-btn{flex:1;height:46px;border-radius:10px;background:var(--gold);border:none;color:#000;font-size:22px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Open Sans',sans-serif;transition:background .15s,transform .1s;-webkit-tap-highlight-color:transparent}
.big-nav-btn:active{background:var(--gold2);transform:scale(.97)}
.big-nav-btn[disabled]{opacity:.25;cursor:default;transform:none}

/* ── BULLET/NUMBER TOGGLE ── */
.list-type-toggle{display:flex;gap:6px;margin-bottom:12px}
.ltt-btn{flex:1;padding:8px;border-radius:7px;border:1px solid var(--b);background:transparent;color:var(--t3);font-size:11px;font-family:'Open Sans',sans-serif;cursor:pointer;transition:all .15s}
.ltt-btn.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700}

/* ── QUOTE STYLE ── */
.slide-quote-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:8px 0}
.slide-quote{position:relative;padding:24px 28px;border-left:4px solid var(--gold);background:#f5c84210;border-radius:0 12px 12px 0}
.slide-quote-mark{font-size:72px;line-height:1;color:var(--gold);font-family:Georgia,serif;position:absolute;top:-10px;left:12px;opacity:.5}
.slide-quote-text{font-size:24px;font-weight:600;font-style:italic;line-height:1.55;color:var(--t);padding-left:32px}
.slide-quote-author{margin-top:16px;font-size:16px;font-weight:600;color:var(--gold);padding-left:32px;letter-spacing:.3px}

.bnewline{background:transparent;border:1px solid var(--b);border-radius:7px;color:var(--t3);width:44px;height:44px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Open Sans',sans-serif;line-height:1.2;text-align:center}
.bnewline:active{border-color:var(--gold);color:var(--gold)}


.autosave-toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--toast-bg);border:1px solid var(--toast-border);border-radius:20px;padding:6px 16px;font-size:11px;color:var(--t3);z-index:999;pointer-events:none;opacity:0;transition:opacity .3s}
.autosave-toast.show{opacity:1}

/* ── MODAL ── */
.moverlay{position:fixed;inset:0;background:var(--overlay);z-index:600;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:600px){.moverlay{align-items:center}}
.modal{background:var(--modal-bg);border:1px solid var(--b);border-radius:16px 16px 0 0;padding:24px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
@media(min-width:600px){.modal{border-radius:14px}}
.modal-handle{width:40px;height:4px;background:var(--b);border-radius:2px;margin:0 auto 20px}
.modal h3{font-family:'Open Sans',sans-serif;font-size:18px;font-weight:700;margin-bottom:16px;color:var(--t)}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:10px;color:var(--t3);margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase}
.fg input{width:100%;background:var(--input-bg);border:1px solid var(--b);border-radius:8px;padding:12px 13px;color:var(--t);font-size:15px;font-family:'Open Sans',sans-serif;outline:none;-webkit-appearance:none;min-height:44px}
.fg input:focus{border-color:var(--gold)}
.blist{display:flex;flex-direction:column;gap:8px}
.brow{display:flex;gap:6px;align-items:center}
.brow input,.brow textarea{flex:1;background:var(--input-bg);border:1px solid var(--b);border-radius:8px;padding:12px 13px;color:var(--t);font-size:15px;font-family:'Open Sans',sans-serif;outline:none;-webkit-appearance:none;min-height:44px;resize:none;overflow:hidden;line-height:1.5}
.brow input:focus,.brow textarea:focus{border-color:var(--gold)}
.bdel{background:transparent;border:1px solid var(--b);border-radius:7px;color:var(--t3);width:44px;height:44px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Open Sans',sans-serif}
.bdel:active{border-color:var(--red);color:var(--red)}
.badd{background:transparent;border:1px dashed var(--b);border-radius:7px;color:var(--t3);padding:10px 14px;cursor:pointer;font-size:13px;font-family:'Open Sans',sans-serif;margin-top:6px;width:100%;text-align:left;min-height:44px}
.badd:active{border-color:var(--gold);color:var(--gold)}
.macts{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--b);flex-wrap:wrap}
.confirm-box{background:var(--modal-bg);border:1px solid var(--b);border-radius:16px 16px 0 0;padding:24px;width:100%;max-width:560px}
@media(min-width:600px){.confirm-box{border-radius:14px}}
.confirm-box h3{font-family:'Open Sans',sans-serif;font-size:16px;font-weight:700;margin-bottom:8px;color:var(--t)}
.confirm-box p{font-size:13px;color:var(--t3);margin-bottom:20px;line-height:1.6}
.breadcrumb{font-size:11px;color:var(--t3);margin-bottom:3px}
.breadcrumb span{color:var(--gold)}

/* ── RESPONSIVE ── */
@media(max-width:640px){

// ── FIREBASE ──
let _unsub=null, _saveTimer=null;
function saveToFirebase(){
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(async()=>{
    if(!window._fbUser||!window._fb) return;
    try{
      await window._fb.save(window._fbUser.uid,{folders:S.folders,selectedTopicId:S.selectedTopicId,updatedAt:Date.now()});

function subscribeFirebase(){
  if(_unsub){ _unsub(); _unsub=null; }
  if(!window._fbUser||!window._fb) return;
  _unsub=window._fb.subscribe(window._fbUser.uid, data=>{
    if(data.folders){ S.folders=data.folders; }
    if(data.selectedTopicId){ S.selectedTopicId=data.selectedTopicId; }
    saveLocal();
    render();
  });
}

function addSwipe(stage,getCard,onNext,onPrev){
  let startX=0,startY=0,dx=0,dragging=false,lockAxis=null;
  const threshold=55;
  function onStart(x,y){startX=x;startY=y;dx=0;dragging=true;lockAxis=null;const c=getCard();if(c)c.classList.add('dragging-card');}
  function onMove(x,y){
    if(!dragging)return;
    const dX=x-startX,dY=y-startY;
    if(!lockAxis){lockAxis=Math.abs(dX)>Math.abs(dY)?'x':'y';}
    if(lockAxis==='y')return;
    dx=dX;const c=getCard();
    if(c){c.style.transform=`translateX(${dx}px)`;c.style.opacity=String(1-Math.min(Math.abs(dx)/280,.45));}
  }
  function onEnd(){
    if(!dragging)return;
    dragging=false;const c=getCard();
    if(c){c.classList.remove('dragging-card');c.style.transform='';c.style.opacity='';}
    if(lockAxis==='y'||lockAxis===null)return;
    if(dx<-threshold)onNext();
    else if(dx>threshold)onPrev();
  }
  stage.addEventListener('touchstart',e=>{const t=e.touches[0];onStart(t.clientX,t.clientY);},{passive:true});
  stage.addEventListener('touchmove',e=>{if(lockAxis==='x')e.preventDefault();const t=e.touches[0];onMove(t.clientX,t.clientY);},{passive:false});
  stage.addEventListener('touchend',onEnd,{passive:true});
  stage.addEventListener('mousedown',e=>onStart(e.clientX,e.clientY));
  stage.addEventListener('mousemove',e=>{if(dragging)onMove(e.clientX,e.clientY);});
  stage.addEventListener('mouseup',onEnd);
  stage.addEventListener('mouseleave',onEnd);
}

function animateSlide(stage,oldCard,dir,buildNew){
  const outClass=dir==='next'?'swipe-left':'swipe-right';
  const inClass=dir==='next'?'incoming-right':'incoming-left';
  oldCard.classList.add(outClass);
  const newCard=buildNew();
  newCard.classList.add(inClass);
  stage.appendChild(newCard);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{newCard.classList.remove(inClass);newCard.classList.add('center');}));
  oldCard.addEventListener('transitionend',()=>oldCard.remove(),{once:true});
  return newCard;
}

function buildSlideCard(topic,idx){
  const page=topic.pages[idx];
  const listType=(page.listType||'bullet');
  const card=el('div','slide-card center');

  let bodyHTML='';
  if(listType==='quote'){
    bodyHTML=`<div class="slide-quote-wrap">
      <div class="slide-quote">
        <div class="slide-quote-mark">"</div>
        <div class="slide-quote-text sbullet-text">${esc(page.quoteText||'')}</div>
        ${page.quoteAuthor?`<div class="slide-quote-author">— ${esc(page.quoteAuthor)}</div>`:''}
      </div>
    </div>`;
  } else {
    const isNum=listType==='number';
    bodyHTML=`<div class="slide-bullets">${(page.bullets||[]).map((b,i)=>`
      <div class="sbullet" data-btext="${esc(b)}">
        ${isNum?`<div class="sbullet-num">${i+1}</div>`:'<div class="sbullet-dot"></div>'}
        <div class="sbullet-text">${esc(b).replace(/\n/g,'<br>')}</div>
      </div>`).join('')}</div>`;
  }

  card.innerHTML=`<div><div class="slide-pg-num">Page ${idx+1} of ${topic.pages.length}</div><div class="slide-stitle">${esc(page.title)}</div></div>${bodyHTML}`;

  // Long-press to copy on mobile
  card.querySelectorAll('.sbullet[data-btext]').forEach(row=>{
    let pressTimer=null;
    function startPress(){
      pressTimer=setTimeout(()=>{
        const text=row.dataset.btext;
        navigator.clipboard.writeText(text).then(()=>{
          row.classList.add('copied');
          showToast('Copied!');
          setTimeout(()=>row.classList.remove('copied'),600);
        }).catch(()=>showToast('Copy failed'));
      },500);
    }
    function cancelPress(){ clearTimeout(pressTimer); }
    row.addEventListener('touchstart', startPress, {passive:true});
    row.addEventListener('touchend',   cancelPress, {passive:true});
    row.addEventListener('touchmove',  cancelPress, {passive:true});
  });

  return card;
}

function renderSlideView(content,topic){
  const pages=topic.pages,idx=S.page;
  const pct=Math.round(((idx+1)/pages.length)*100);
  const d=el('div','slide-view');
  d.innerHTML=`
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:${pct}%"></div></div>
    <div class="slide-stage" id="slide-stage"></div>
    <div class="slide-header">
      <div class="slide-dots" id="slide-dots" style="flex:1;justify-content:flex-start;padding:0">${pages.map((_,i)=>`<div class="sdot ${i===idx?'active':''}" data-di="${i}"></div>`).join('')}</div>
      <button class="slide-add-btn" id="slide-add-btn" title="Add new page">+</button>
    </div>
    <div class="big-nav">
      <button class="big-nav-btn prev-btn" id="sprev" ${idx===0?'disabled':''}>←</button>
      <button class="big-nav-btn next-btn" id="snext" ${idx===pages.length-1?'disabled':''}>→</button>
    </div>`;

  const stage=d.querySelector('#slide-stage');
  stage.appendChild(buildSlideCard(topic,idx));

  // "+" opens Add Page modal with insert-after current page flag
  d.querySelector('#slide-add-btn').addEventListener('click',()=>{
    S.modal='page';
    S.editPageIdx=null;
    S.insertAfter=S.page; // insert after current page
    render();
  });

  function goTo(newIdx,dir){
    if(newIdx<0||newIdx>=pages.length)return;
    S.page=newIdx;saveNav();
    const old=stage.querySelector('.slide-card');
    animateSlide(stage,old,dir,()=>buildSlideCard(topic,newIdx));
    d.querySelector('#prog-fill').style.width=Math.round(((newIdx+1)/pages.length)*100)+'%';
    d.querySelectorAll('.sdot').forEach((dot,i)=>dot.classList.toggle('active',i===newIdx));
    d.querySelector('#sprev').disabled=newIdx===0;
    d.querySelector('#snext').disabled=newIdx===pages.length-1;
  }

  d.querySelector('#sprev').addEventListener('click',()=>goTo(S.page-1,'prev'));
  d.querySelector('#snext').addEventListener('click',()=>goTo(S.page+1,'next'));
  d.querySelectorAll('.sdot').forEach(dot=>{dot.addEventListener('click',()=>{const i=+dot.dataset.di;goTo(i,i>S.page?'next':'prev');});});
  addSwipe(stage,()=>stage.querySelector('.slide-card'),()=>goTo(S.page+1,'next'),()=>goTo(S.page-1,'prev'));
  content.appendChild(d);
}

function renderTOC(content,topic){
  if(topic.pages.length===0){content.innerHTML=`<div class="toc-hdr"><h3>${esc(topic.name)}</h3><p>No pages yet</p></div><div class="empty"><div class="ei">📄</div><p>Tap "+ Add Page" to create your first slide!</p></div>`;return;}
  const d=el('div');
  d.innerHTML=`<div class="toc-hdr"><h3>${esc(topic.name)}</h3><p>${topic.pages.length} page${topic.pages.length!==1?'s':''} · Tap to present · Drag ⠿ to reorder</p></div>
    <table class="toc-table"><thead><tr><th></th><th>#</th><th>Title</th><th></th></tr></thead>
    <tbody>${topic.pages.map((p,i)=>`<tr data-idx="${i}"><td><span class="dhandle" draggable="true" data-drag="${i}">⠿</span></td><td class="tc-num">${i+1}</td><td class="tc-title" data-goto="${i}">${esc(p.title)}</td><td class="tc-acts"><button class="tc-btn prs" data-prs="${i}">▶</button><button class="tc-btn edt" data-edt="${i}">Edit</button><button class="tc-btn del" data-del="${i}">Del</button></td></tr>`).join('')}</tbody></table>`;
  d.querySelectorAll('[data-goto]').forEach(c=>{c.addEventListener('click',()=>{S.page=+c.dataset.goto;S.view='slide';saveNav();render();});});
  d.querySelectorAll('[data-prs]').forEach(b=>{b.addEventListener('click',()=>{S.page=+b.dataset.prs;S.view='slide';saveNav();render();});});
  d.querySelectorAll('[data-edt]').forEach(b=>{b.addEventListener('click',()=>{S.modal='page';S.editPageIdx=+b.dataset.edt;render();});});
  d.querySelectorAll('[data-del]').forEach(b=>{b.addEventListener('click',()=>{S.modal='confirm';S.confirm={type:'del-page',idx:+b.dataset.del,label:`Delete "${topic.pages[+b.dataset.del].title}"?`,desc:'This page will be permanently removed.'};render();});});
  let dragIdx=null;
  d.querySelectorAll('.dhandle').forEach(h=>{h.addEventListener('dragstart',()=>{dragIdx=+h.dataset.drag;setTimeout(()=>h.closest('tr').classList.add('dragging'),0);});});
  d.querySelectorAll('tbody tr').forEach(row=>{row.addEventListener('dragover',e=>{e.preventDefault();row.classList.add('drag-over');});row.addEventListener('dragleave',()=>row.classList.remove('drag-over'));row.addEventListener('drop',e=>{e.preventDefault();row.classList.remove('drag-over');const to=+row.dataset.idx;if(dragIdx!==null&&dragIdx!==to){const[m]=topic.pages.splice(dragIdx,1);topic.pages.splice(to,0,m);saveData();render();}dragIdx=null;});});
  content.appendChild(d);
}

function renderModal(app){
  const ov=el('div','moverlay');
  ov.addEventListener('click',e=>{if(e.target===ov){S.modal=null;S.insertAfter=null;render();}});

  if(S.modal==='page'){
    const topic=getTopic(),editing=S.editPageIdx!==null,ex=editing?topic.pages[S.editPageIdx]:null;
    let bullets=ex?[...( ex.bullets||[] )]:['',''];
    let listType=(ex&&ex.listType)||'bullet';
    const m=el('div','modal');
    m.innerHTML=`<div class="modal-handle"></div><h3>${editing?'Edit Page':'Add New Page'}</h3>
      <div class="fg"><label>Page Title</label><input id="ptitle" value="${ex?esc(ex.title):''}" placeholder="e.g. The Key Insight" autocomplete="off"></div>
      <div class="fg">
        <label>Page Style</label>
        <div class="list-type-toggle">
          <button class="ltt-btn ${listType==='bullet'?'active':''}" data-lt="bullet">● Bullets</button>
          <button class="ltt-btn ${listType==='number'?'active':''}" data-lt="number">1. Numbers</button>
          <button class="ltt-btn ${listType==='quote'?'active':''}" data-lt="quote">" Quote</button>
        </div>
      </div>
      <div id="bullets-section" style="display:${listType==='quote'?'none':'block'}">
        <div class="fg">
          <label>Points (max 7)</label>
          <div style="font-size:10px;color:var(--t3);margin-bottom:8px">Enter = new point &nbsp;·&nbsp; ↵ line button = new line in same point &nbsp;·&nbsp; Paste splits lines</div>
          <div class="blist" id="blist"></div>
          <button class="badd" id="badd">+ Add Point</button>
        </div>
      </div>
      <div id="quote-section" style="display:${listType==='quote'?'block':'none'}">
        <div class="fg"><label>Quote Text</label><input id="quote-text" value="${ex&&ex.quoteText?esc(ex.quoteText):''}" placeholder="Enter the quote here..." autocomplete="off"></div>
        <div class="fg"><label>Author (optional)</label><input id="quote-author" value="${ex&&ex.quoteAuthor?esc(ex.quoteAuthor):''}" placeholder="— Author name" autocomplete="off"></div>
      </div>
      <div class="macts">${editing?`<button class="btn btn-red" id="del-pg-btn">Delete</button>`:''}<button class="btn btn-ghost" id="mcancel">Cancel</button><button class="btn btn-gold" id="msave">${editing?'Save':'Add Page'}</button></div>`;

    const upd=(focusIdx=-1)=>{
      const bl=m.querySelector('#blist');
      bl.innerHTML=bullets.map((_,i)=>`
        <div class="brow">
          <textarea class="bi" data-i="${i}" rows="1" placeholder="Point ${i+1}... (Enter = new point)">${esc(bullets[i]||'')}</textarea>
          <button class="bnewline" data-nl="${i}" title="New line in this point">↵<br>line</button>
          <button class="bdel" data-d="${i}">×</button>
        </div>`).join('');
      bl.querySelectorAll('.bi').forEach(ta=>{
        const resize=()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';};
        ta.addEventListener('input',e=>{bullets[+ta.dataset.i]=ta.value;resize();});
        setTimeout(()=>resize(),0);
        ta.addEventListener('keydown',e=>{
          if(e.key==='Enter'&&!e.shiftKey){
            e.preventDefault();
            const i=+ta.dataset.i;
            if(bullets.length<7){bullets.splice(i+1,0,'');upd(i+1);}
          }
        });
        ta.addEventListener('paste',e=>{
          e.preventDefault();
          const text=(e.clipboardData||window.clipboardData).getData('text');
          const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l);
          if(!lines.length) return;
          const i=+ta.dataset.i;
          bullets.splice(i,1,...lines);
          if(bullets.length>7) bullets.length=7;
          upd(i+lines.length-1);
        });
      });
      // newline button — inserts \n at cursor position in that bullet
      bl.querySelectorAll('.bnewline').forEach(btn=>btn.addEventListener('click',()=>{
        const i=+btn.dataset.nl;
        const ta=bl.querySelectorAll('.bi')[i];
        const pos=ta.selectionStart;
        const val=ta.value;
        bullets[i]=val.slice(0,pos)+'\n'+val.slice(pos);
        upd(i);
        // reposition cursor after the \n
        setTimeout(()=>{
          const newTa=m.querySelector('#blist').querySelectorAll('.bi')[i];
          if(newTa){newTa.focus();newTa.setSelectionRange(pos+1,pos+1);}
        },10);
      }));
      bl.querySelectorAll('.bdel').forEach(btn=>btn.addEventListener('click',()=>{
        if(bullets.length>1){bullets.splice(+btn.dataset.d,1);upd();}
        else{bullets[0]='';upd(0);}
      }));
      if(focusIdx>=0){
        const targets=bl.querySelectorAll('.bi');
        const target=targets[Math.min(focusIdx,targets.length-1)];
        if(target){setTimeout(()=>{target.focus();const l=target.value.length;target.setSelectionRange(l,l);},10);}
      }
    };upd();
    m.querySelectorAll('.ltt-btn').forEach(btn=>{btn.addEventListener('click',()=>{
      listType=btn.dataset.lt;
      m.querySelectorAll('.ltt-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      m.querySelector('#bullets-section').style.display=listType==='quote'?'none':'block';
      m.querySelector('#quote-section').style.display=listType==='quote'?'block':'none';
    });});
    m.querySelector('#badd').addEventListener('click',()=>{if(bullets.length<7){bullets.push('');upd(bullets.length-1);}});
    m.querySelector('#mcancel').addEventListener('click',()=>{S.modal=null;S.insertAfter=null;render();});
    if(editing)m.querySelector('#del-pg-btn').addEventListener('click',()=>{S.modal='confirm';S.confirm={type:'del-page',idx:S.editPageIdx,label:`Delete "${ex.title}"?`,desc:'This page will be permanently removed.'};render();});
    m.querySelector('#msave').addEventListener('click',()=>{
      const title=m.querySelector('#ptitle').value.trim();if(!title){m.querySelector('#ptitle').focus();return;}
      let pageData;
      if(listType==='quote'){
        const quoteText=m.querySelector('#quote-text').value.trim();
        if(!quoteText){m.querySelector('#quote-text').focus();return;}
        pageData={title,listType,quoteText,quoteAuthor:m.querySelector('#quote-author').value.trim(),bullets:[]};
      } else {
        const filled=bullets.filter(b=>b.trim());
        pageData={title,listType,bullets:filled.length?filled:['Add content here']};
      }
      if(editing){topic.pages[S.editPageIdx]=pageData;}else{
        // insert after current page if triggered from slide view, otherwise append
        if(S.insertAfter!=null){
          topic.pages.splice(S.insertAfter+1,0,pageData);
          S.page=S.insertAfter+1; // jump to new page
        } else {
          topic.pages.push(pageData);
        }
      }
      S.modal=null;S.editPageIdx=null;S.insertAfter=null;
      if(!editing)S.view='slide';
      saveData();render();
    });
    ov.appendChild(m);

  } else if(S.modal==='new-folder'){
    const m=el('div','modal');
    m.innerHTML=`<div class="modal-handle"></div><h3>New Folder</h3><div class="fg"><label>Folder Name</label><input id="fname" placeholder="e.g. Conference Talks" autocomplete="off"></div><div class="macts"><button class="btn btn-ghost" id="mcancel">Cancel</button><button class="btn btn-gold" id="msave">Create</button></div>`;
    m.querySelector('#mcancel').addEventListener('click',()=>{S.modal=null;render();});
    m.querySelector('#msave').addEventListener('click',()=>{
      const name=m.querySelector('#fname').value.trim();if(!name){m.querySelector('#fname').focus();return;}
      S.folders.push({id:Date.now(),name,icon:'',open:true,topics:[]});
      S.modal=null;saveData();render();
    });
    ov.appendChild(m);

  } else if(S.modal==='edit-folder'){
    const ef=S.folders.find(f=>f.id===S.editFolderTarget);
    const m=el('div','modal');
    m.innerHTML=`<div class="modal-handle"></div><h3>Rename Folder</h3><div class="fg"><label>Folder Name</label><input id="fname" value="${ef?esc(ef.name):''}" autocomplete="off"></div><div class="macts"><button class="btn btn-ghost" id="mcancel">Cancel</button><button class="btn btn-gold" id="msave">Save</button></div>`;
    m.querySelector('#mcancel').addEventListener('click',()=>{S.modal=null;render();});
    m.querySelector('#msave').addEventListener('click',()=>{
      const name=m.querySelector('#fname').value.trim();if(!name){m.querySelector('#fname').focus();return;}
      if(ef)ef.name=name;S.modal=null;saveData();render();
    });
    ov.appendChild(m);

  } else if(S.modal==='new-topic'||S.modal==='edit-topic'){
    const editing=S.modal==='edit-topic',et=editing?allTopics().find(t=>t.id===S.editTopicTarget):null;
    const m=el('div','modal');
    m.innerHTML=`<div class="modal-handle"></div><h3>${editing?'Edit Topic':'New Topic'}</h3><div class="fg"><label>Topic Name</label><input id="tname" value="${et?esc(et.name):''}" placeholder="e.g. Leadership Talk" autocomplete="off"></div><div class="macts"><button class="btn btn-ghost" id="mcancel">Cancel</button><button class="btn btn-gold" id="msave">${editing?'Save':'Add Topic'}</button></div>`;
    m.querySelector('#mcancel').addEventListener('click',()=>{S.modal=null;render();});
    m.querySelector('#msave').addEventListener('click',()=>{
      const name=m.querySelector('#tname').value.trim();if(!name){m.querySelector('#tname').focus();return;}
      if(editing){et.name=name;}else{const f=S.folders.find(x=>x.id===S.editFolderTarget);f.topics.push({id:Date.now(),name,icon:'',pages:[]});}
      S.modal=null;saveData();render();
    });
    ov.appendChild(m);

  } else if(S.modal==='confirm'){
    const c=S.confirm,isInfo=c.type==='info';
    const m=el('div','confirm-box');
    m.innerHTML=`<div class="modal-handle"></div><h3>${c.label}</h3><p>${c.desc}</p><div class="macts"><button class="btn btn-ghost" id="mcancel">${isInfo?'OK':'Cancel'}</button>${!isInfo?`<button class="btn btn-red" id="mconfirm">Delete</button>`:''}</div>`;
    m.querySelector('#mcancel').addEventListener('click',()=>{S.modal=null;S.confirm=null;render();});
    if(!isInfo)m.querySelector('#mconfirm').addEventListener('click',()=>{
      if(c.type==='del-page'){const t=getTopic();t.pages.splice(c.idx,1);if(S.page>=t.pages.length)S.page=Math.max(0,t.pages.length-1);S.view='toc';}
      else if(c.type==='del-topic'){S.folders.forEach(f=>{f.topics=f.topics.filter(t=>t.id!==c.id);});if(!allTopics().find(t=>t.id===S.selectedTopicId))S.selectedTopicId=allTopics()[0]?.id||null;}
      else if(c.type==='del-folder'){S.folders=S.folders.filter(f=>f.id!==c.id);if(!allTopics().find(t=>t.id===S.selectedTopicId))S.selectedTopicId=allTopics()[0]?.id||null;}
      S.modal=null;S.confirm=null;S.editPageIdx=null;saveData();render();
    });
    ov.appendChild(m);
  }
  app.appendChild(ov);
}

document.addEventListener('keydown',e=>{
  if(S.modal)return;
  const t=getTopic();
  if(S.view==='slide'){
    if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(t&&S.page<t.pages.length-1){const st=document.querySelector('#slide-stage');if(st){const old=st.querySelector('.slide-card');S.page++;saveNav();animateSlide(st,old,'next',()=>buildSlideCard(t,S.page));document.querySelector('#prog-fill').style.width=Math.round(((S.page+1)/t.pages.length)*100)+'%';document.querySelectorAll('.sdot').forEach((d,i)=>d.classList.toggle('active',i===S.page));document.querySelector('#sprev').disabled=S.page===0;document.querySelector('#snext').disabled=S.page===t.pages.length-1;}}}
    if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.page>0){const st=document.querySelector('#slide-stage');if(st){const old=st.querySelector('.slide-card');S.page--;saveNav();animateSlide(st,old,'prev',()=>buildSlideCard(t,S.page));document.querySelector('#prog-fill').style.width=Math.round(((S.page+1)/t.pages.length)*100)+'%';document.querySelectorAll('.sdot').forEach((d,i)=>d.classList.toggle('active',i===S.page));document.querySelector('#sprev').disabled=S.page===0;document.querySelector('#snext').disabled=S.page===t.pages.length-1;}}}
    if(e.key==='Escape'){S.view='toc';render();}
  }
});

render();
</script>
</body>
